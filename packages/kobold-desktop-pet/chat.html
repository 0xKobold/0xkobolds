<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐢 Kobold Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #475569;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    
    /* Canvas Section (Top) */
    #canvas-section {
      height: 45vh;
      min-height: 200px;
      max-height: 400px;
      position: relative;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid var(--border);
    }
    
    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    #vrm-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.9);
      z-index: 10;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #status-text {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 14px;
    }
    
    /* Connection Status */
    #connection-status {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      background: rgba(0,0,0,0.5);
    }
    
    #connection-status.connected { color: #10b981; }
    #connection-status.disconnected { color: #ef4444; }
    #connection-status.connecting { color: #fbbf24; }
    
    #connection-status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    
    /* Chat Section (Bottom) */
    #chat-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      align-self: flex-end;
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .message.assistant {
      align-self: flex-start;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    
    .message.system {
      align-self: center;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-style: italic;
    }
    
    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
    }
    
    /* Input Area */
    #input-area {
      padding: 12px 16px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
    }
    
    #input-form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    
    #message-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 14px;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      outline: none;
      font-family: inherit;
    }
    
    #message-input:focus {
      border-color: var(--primary);
    }
    
    #message-input::placeholder {
      color: var(--text-muted);
    }
    
    #send-button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }
    
    #send-button:hover {
      background: var(--primary-dark);
    }
    
    #send-button:active {
      transform: scale(0.95);
    }
    
    #send-button:disabled {
      background: var(--border);
      cursor: not-allowed;
    }
    
    #send-button svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
    
    /* Typing Indicator */
    #typing-indicator {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-muted);
      display: none;
    }
    
    #typing-indicator.visible {
      display: block;
    }
    
    .typing-dots {
      display: inline-flex;
      gap: 4px;
    }
    
    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    
    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    /* Desktop Layout */
    @media (min-width: 768px) {
      body {
        flex-direction: row;
      }
      
      #canvas-section {
        width: 40%;
        max-width: 500px;
        height: 100vh;
        max-height: none;
      }
      
      #chat-section {
        flex: 1;
      }
    }
    
    /* Scrollbar */
    #messages::-webkit-scrollbar {
      width: 6px;
    }
    
    #messages::-webkit-scrollbar-track {
      background: transparent;
    }
    
    #messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    
    #messages::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
    
    /* Connection Modal */
    #connect-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    #connect-modal.hidden {
      display: none;
    }
    
    .modal-content {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    
    .modal-content h2 {
      margin-bottom: 16px;
      color: var(--primary);
    }
    
    .modal-content input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    
    .modal-content input:focus {
      border-color: var(--primary);
    }
    
    .modal-content button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
    }
    
    .modal-content button:hover {
      background: var(--primary-dark);
    }
  </style>
</head>
<body>
  <!-- Canvas Section (Top) -->
  <div id="canvas-section">
    <div id="canvas-container">
      <canvas id="vrm-canvas"></canvas>
      <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="status-text">Loading Cool Turtle...</div>
      </div>
    </div>
    <div id="connection-status" class="disconnected">Disconnected</div>
  </div>

  <!-- Chat Section (Bottom) -->
  <div id="chat-section">
    <div id="messages">
      <div class="message system">Connected to Kobold. Say hello! 🐢</div>
    </div>
    <div id="typing-indicator">
      <span class="typing-dots"><span></span><span></span><span></span></span> Kobold is thinking...
    </div>
    <div id="input-area">
      <form id="input-form">
        <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
        <button id="send-button" type="submit">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- Connection Modal -->
  <div id="connect-modal">
    <div class="modal-content">
      <h2>🐢 Kobold Chat</h2>
      <p style="margin-bottom: 16px; color: var(--text-muted);">Enter gateway URL to connect</p>
      <input type="text" id="gateway-url" placeholder="ws://localhost:7777" value="ws://100.65.167.97:7777">
      <button id="connect-btn">Connect</button>
      <p style="margin-top: 12px; font-size: 12px; color: var(--text-muted);">
        Or use local: ws://localhost:7777
      </p>
    </div>
  </div>

  <!-- Three.js from CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin, VRMUtils } from 'https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.0.0/lib/index.module.js';

    // State
    let scene, camera, renderer, controls;
    let vrm = null;
    let mixer = null;
    let clock = new THREE.Clock();
    let ws = null;
    let connected = false;
    let sessionId = null;

    // DOM elements
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('message-input');
    const formEl = document.getElementById('input-form');
    const sendBtn = document.getElementById('send-button');
    const statusText = document.getElementById('status-text');
    const loadingOverlay = document.getElementById('loading-overlay');
    const connectionStatus = document.getElementById('connection-status');
    const typingIndicator = document.getElementById('typing-indicator');
    const connectModal = document.getElementById('connect-modal');
    const gatewayUrlInput = document.getElementById('gateway-url');
    const connectBtn = document.getElementById('connect-btn');

    // Initialize Three.js
    function initThree() {
      const canvas = document.getElementById('vrm-canvas');
      const container = document.getElementById('canvas-container');

      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a2e);

      // Camera
      camera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.1, 100);
      camera.position.set(0, 1.2, 2.5);

      // Renderer
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      // Controls
      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 1, 0);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 1.5;
      controls.maxDistance = 4;
      controls.enablePan = false;

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 10, 5);
      scene.add(directionalLight);

      // Handle resize
      window.addEventListener('resize', () => {
        const width = container.clientWidth;
        const height = container.clientHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      });

      // Load VRM
      loadVRM();

      // Start animation loop
      animate();
    }

    // Load VRM model
    async function loadVRM() {
      statusText.textContent = 'Loading Cool Turtle...';

      try {
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        // Try to load from local assets first
        const gltf = await loader.loadAsync('assets/avatars/coolturtle.vrm');
        vrm = gltf.userData.vrm;

        if (!vrm) {
          throw new Error('VRM not found');
        }

        VRMUtils.removeUnnecessaryJoints(gltf.scene);

        // Center model
        const box = new THREE.Box3().setFromObject(vrm.scene);
        const center = box.getCenter(new THREE.Vector3());
        vrm.scene.position.y = -center.y + 0.1;

        scene.add(vrm.scene);
        mixer = new THREE.AnimationMixer(vrm.scene);

        statusText.textContent = 'Ready!';
        setTimeout(() => {
          loadingOverlay.style.display = 'none';
        }, 500);

        setAvatarState('idle');

      } catch (error) {
        console.error('VRM load failed:', error);
        showPlaceholderTurtle();
        statusText.textContent = 'Using placeholder';
        setTimeout(() => {
          loadingOverlay.style.display = 'none';
        }, 1000);
      }
    }

    // Placeholder turtle
    function showPlaceholderTurtle() {
      const bodyGeom = new THREE.SphereGeometry(0.3, 32, 16);
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x10b981 });
      const body = new THREE.Mesh(bodyGeom, bodyMat);
      body.scale.set(1, 0.6, 1.2);
      body.position.y = 0.4;
      scene.add(body);

      const headGeom = new THREE.SphereGeometry(0.15, 16, 8);
      const head = new THREE.Mesh(headGeom, bodyMat);
      head.position.set(0, 0.55, 0.35);
      scene.add(head);

      const shellGeom = new THREE.SphereGeometry(0.32, 8, 4);
      const shellMat = new THREE.MeshStandardMaterial({ color: 0x059669 });
      const shell = new THREE.Mesh(shellGeom, shellMat);
      shell.scale.set(0.9, 0.4, 1);
      shell.position.y = 0.45;
      scene.add(shell);
    }

    // Animation states
    function setAvatarState(state) {
      if (!vrm) return;
      
      // Simple breathing animation based on state
      const intensity = {
        idle: 0.02,
        thinking: 0.03,
        working: 0.04,
        sleeping: 0.01
      }[state] || 0.02;

      // Could add animation clips here
      console.log('Avatar state:', state);
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const time = clock.getElapsedTime();

      if (vrm) {
        vrm.update(delta);
        // Breathing
        vrm.scene.position.y = Math.sin(time * 2) * 0.01;
      }

      if (mixer) {
        mixer.update(delta);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    // WebSocket connection
    function connectWebSocket(url) {
      connectionStatus.className = 'connecting';
      connectionStatus.textContent = 'Connecting...';

      try {
        ws = new WebSocket(url);

        ws.onopen = () => {
          connected = true;
          connectionStatus.className = 'connected';
          connectionStatus.textContent = 'Connected';
          connectModal.classList.add('hidden');
          
          addMessage('system', 'Connected to Kobold! Say hello! 🐢');

          // Send hello
          ws.send(JSON.stringify({
            type: 'hello',
            role: 'web',
            name: 'web-client',
            version: '1.0'
          }));
        };

        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            handleWebSocketMessage(data);
          } catch (e) {
            console.error('Parse error:', e);
          }
        };

        ws.onclose = () => {
          connected = false;
          connectionStatus.className = 'disconnected';
          connectionStatus.textContent = 'Disconnected';
          addMessage('system', 'Disconnected from server');
        };

        ws.onerror = (error) => {
          connectionStatus.className = 'disconnected';
          connectionStatus.textContent = 'Error';
          addMessage('error', 'Connection error. Check gateway URL.');
        };

      } catch (error) {
        addMessage('error', 'Failed to connect: ' + error.message);
      }
    }

    // Handle incoming messages
    function handleWebSocketMessage(data) {
      typingIndicator.classList.remove('visible');

      if (data.type === 'hello_ok') {
        sessionId = data.session_id;
        console.log('Session:', sessionId);
      } else if (data.type === 'response' || data.type === 'message') {
        const content = data.content || data.message || data.text || JSON.stringify(data);
        addMessage('assistant', content);
        setAvatarState('idle');
      } else if (data.type === 'agent_state') {
        setAvatarState(data.state || 'idle');
      }
    }

    // Add message to chat
    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Send message
    function sendMessage(text) {
      if (!text.trim() || !connected) return;

      addMessage('user', text);
      inputEl.value = '';
      inputEl.style.height = 'auto';

      // Show typing
      typingIndicator.classList.add('visible');
      setAvatarState('thinking');

      // Send to gateway
      ws.send(JSON.stringify({
        type: 'message',
        content: text,
        session_id: sessionId
      }));
    }

    // Event listeners
    formEl.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage(inputEl.value);
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(inputEl.value);
      }
    });

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // Connect button
    connectBtn.addEventListener('click', () => {
      const url = gatewayUrlInput.value.trim();
      if (url) {
        connectWebSocket(url);
      }
    });

    // Initialize
    initThree();
  </script>
</body>
</html>
