<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐢 CoolTurtle - VRM Desktop Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #1a1a2e;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    
    #canvas-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #info {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #10b981;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 100;
    }
    
    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 100;
    }
    
    button {
      background: #10b981;
      color: #1a1a2e;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    button:hover {
      background: #34d399;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }
    
    button:disabled {
      background: #4b5563;
      cursor: not-allowed;
      transform: none;
    }
    
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fbbf24;
      font-size: 24px;
      text-align: center;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #1a1a2e;
      border-top: 4px solid #10b981;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="info">
    <h3>🐢 CoolTurtle Desktop Pet</h3>
    <p>Avatar: <span id="avatar-name">Loading...</span></p>
    <p>State: <span id="state">idle</span></p>
    <p>FPS: <span id="fps">0</span></p>
  </div>
  
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading VRM Avatar...</p>
  </div>
  
  <div id="controls">
    <button onclick="setState('idle')">🧍 Idle</button>
    <button onclick="setState('working')">💼 Working</button>
    <button onclick="setState('thinking')">🤔 Thinking</button>
    <button onclick="setState('sleeping')">😴 Sleeping</button>
    <button onclick="toggleRotate()">🔄 Toggle Rotate</button>
  </div>
  
  <div id="canvas-container"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
      }
    }
  </script>
  
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin, VRM } from '@pixiv/three-vrm';
    
    // Global state
    let scene, camera, renderer, controls;
    let vrm = null;
    let currentState = 'idle';
    let autoRotate = true;
    let clock = new THREE.Clock();
    let frameCount = 0;
    let lastFpsUpdate = 0;
    
    // Animation state
    const stateSettings = {
      idle: { lookAtCamera: true, blinkRate: 0.02 },
      working: { lookAtCamera: false, blinkRate: 0.01 },
      thinking: { lookAtCamera: true, blinkRate: 0.03 },
      sleeping: { lookAtCamera: false, blinkRate: 0.005 }
    };
    
    // Initialize Three.js scene
    function initScene() {
      const container = document.getElementById('canvas-container');
      
      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a2e);
      
      // Camera
      camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
      camera.position.set(0, 1.3, 2.5);
      
      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      container.appendChild(renderer.domElement);
      
      // Controls
      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 1, 0);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      
      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);
      
      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(1, 2, 1);
      scene.add(directionalLight);
      
      // Hemisphere light for softer shadows
      const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.3);
      scene.add(hemiLight);
      
      // Ground plane (for reference)
      const groundGeometry = new THREE.PlaneGeometry(10, 10);
      const groundMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x1a1a2e,
        transparent: true,
        opacity: 0.3
      });
      const ground = new THREE.Mesh(groundGeometry, groundMaterial);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      scene.add(ground);
      
      // Handle resize
      window.addEventListener('resize', onWindowResize);
    }
    
    // Load VRM avatar
    async function loadVRM(url) {
      const loader = new GLTFLoader();
      loader.register((parser) => new VRMLoaderPlugin(parser));
      
      try {
        const gltf = await loader.loadAsync(url);
        vrm = gltf.userData.vrm;
        
        // Add to scene
        scene.add(vrm.scene);
        
        // Print bone structure for debugging
        console.log('VRM loaded successfully');
        console.log('Humanoid bones:', vrm.humanoid);
        
        return vrm;
      } catch (error) {
        console.error('Error loading VRM:', error);
        throw error;
      }
    }
    
    // Update VRM (idle animation, blinking, etc.)
    function updateVRM(deltaTime) {
      if (!vrm) return;
      
      // Update VRM internals
      vrm.update(deltaTime);
      
      // Simple idle breathing animation
      const breathe = Math.sin(clock.getElapsedTime() * 2) * 0.02;
      const spine = vrm.humanoid.getNormalizedBoneNode('spine');
      if (spine) {
        spine.rotation.x = breathe;
      }
      
      // Blinking
      const settings = stateSettings[currentState] || stateSettings.idle;
      if (Math.random() < settings.blinkRate) {
        blink();
      }
      
      // Look at camera
      if (settings.lookAtCamera && vrm.lookAt) {
        vrm.lookAt.lookAt(camera.position.clone().sub(vrm.scene.position));
      }
      
      // Auto-rotate
      if (autoRotate) {
        vrm.scene.rotation.y += deltaTime * 0.1;
      }
    }
    
    // Blink animation
    let blinkState = 0;
    function blink() {
      if (!vrm || !vrm.expressionManager) return;
      
      const blinkLeft = vrm.expressionManager.getValue('blinkLeft');
      const blinkRight = vrm.expressionManager.getValue('blinkRight');
      
      // Simple blink (toggle)
      vrm.expressionManager.setValue('blinkLeft', 1);
      vrm.expressionManager.setValue('blinkRight', 1);
      
      setTimeout(() => {
        if (vrm && vrm.expressionManager) {
          vrm.expressionManager.setValue('blinkLeft', 0);
          vrm.expressionManager.setValue('blinkRight', 0);
        }
      }, 100);
    }
    
    // Set animation state
    window.setState = function(state) {
      currentState = state;
      document.getElementById('state').textContent = state;
      
      // Update expression based on state
      if (vrm && vrm.expressionManager) {
        // Reset all expressions
        vrm.expressionManager.setValue('happy', 0);
        vrm.expressionManager.setValue('sad', 0);
        vrm.expressionManager.setValue('angry', 0);
        vrm.expressionManager.setValue('relaxed', 0);
        vrm.expressionManager.setValue('surprised', 0);
        
        // Set appropriate expression
        switch (state) {
          case 'idle':
            vrm.expressionManager.setValue('relaxed', 0.5);
            break;
          case 'working':
            vrm.expressionManager.setValue('neutral', 0.5);
            break;
          case 'thinking':
            // Maybe look up
            break;
          case 'sleeping':
            vrm.expressionManager.setValue('relaxed', 0.8);
            break;
        }
      }
    };
    
    // Toggle auto-rotate
    window.toggleRotate = function() {
      autoRotate = !autoRotate;
    };
    
    // Window resize handler
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      
      const deltaTime = clock.getDelta();
      
      // Update controls
      controls.update();
      
      // Update VRM
      updateVRM(deltaTime);
      
      // Render
      renderer.render(scene, camera);
      
      // FPS counter
      frameCount++;
      if (clock.getElapsedTime() - lastFpsUpdate > 1) {
        document.getElementById('fps').textContent = frameCount;
        frameCount = 0;
        lastFpsUpdate = clock.getElapsedTime();
      }
    }
    
    // Initialize
    async function init() {
      initScene();
      
      // Try loading the VRM
      const vrmUrls = [
        'assets/avatars/coolturtle.vrm',
        'assets/avatars/coolturtle-voxel.vrm'
      ];
      
      for (const url of vrmUrls) {
        try {
          await loadVRM(url);
          document.getElementById('avatar-name').textContent = 'CoolTurtle (182)';
          document.getElementById('loading').style.display = 'none';
          break;
        } catch (e) {
          console.log(`Failed to load ${url}, trying next...`);
        }
      }
      
      if (!vrm) {
        document.getElementById('loading').innerHTML = `
          <p style="color: #ef4444;">Failed to load VRM avatar</p>
          <p style="font-size: 14px; margin-top: 10px;">
            Make sure assets/avatars/coolturtle.vrm exists
          </p>
        `;
        return;
      }
      
      // Start animation loop
      animate();
    }
    
    // Start
    init().catch(console.error);
  </script>
</body>
</html>
