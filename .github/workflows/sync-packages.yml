name: Sync Packages to Individual Repos

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/pi-wallet/**'
      - 'packages/pi-erc8004/**'
      - 'packages/pi-ollama/**'

jobs:
  sync-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push pi-wallet to separate repo
        run: |
          git remote add pi-wallet https://${{ secrets.GITHUB_TOKEN }}@github.com/0xKobold/pi-wallet.git 2>/dev/null || true
          git subtree push --prefix=packages/pi-wallet pi-wallet main || echo "No changes to push"

      - name: Push pi-erc8004 to separate repo
        run: |
          git remote add pi-erc8004 https://${{ secrets.GITHUB_TOKEN }}@github.com/0xKobold/pi-erc8004.git 2>/dev/null || true
          git subtree push --prefix=packages/pi-erc8004 pi-erc8004 main || echo "No changes to push"

      - name: Push pi-ollama to separate repo
        run: |
          git remote add pi-ollama https://${{ secrets.GITHUB_TOKEN }}@github.com/0xKobold/pi-ollama.git 2>/dev/null || true
          git subtree push --prefix=packages/pi-ollama pi-ollama main || echo "No changes to push"