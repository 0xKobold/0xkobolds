# 0xKobold Production Docker Compose
# Deploys 0xKobold with nginx reverse proxy and SSL

version: '3.8'

services:
  # Main 0xKobold Application
  kobold:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: 0xkobold-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=18789
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
    volumes:
      # Persist data across restarts
      - kobold-data:/home/kobold/.0xkobold
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:18789:18789"  # Only accessible via nginx
    networks:
      - kobold-network
    healthcheck:
      test: ["CMD", "bun", "run", "dist/src/cli/index.js", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Ollama (optional - can be external)
  ollama:
    image: ollama/ollama:latest
    container_name: 0xkobold-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    networks:
      - kobold-network
    profiles:
      - with-ollama  # Only start with: docker-compose --profile with-ollama up

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: 0xkobold-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - kobold
    networks:
      - kobold-network

  # Let's Encrypt for SSL
  certbot:
    image: certbot/certbot:latest
    container_name: 0xkobold-certbot
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    profiles:
      - ssl

volumes:
  kobold-data:
    driver: local
  ollama-models:
    driver: local
  certbot-data:
    driver: local
  certbot-www:
    driver: local

networks:
  kobold-network:
    driver: bridge
